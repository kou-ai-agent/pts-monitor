name: Daily PTS Monitor Fetch

on:
  schedule:
    # 月〜金曜の翌営業日 0:30 JST = 火〜土曜 15:30 UTC
    - cron: '30 15 * * 1-5'
  workflow_dispatch: # 手動実行用トグル

permissions:
  contents: write

jobs:
  run-batch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run daily pipeline (Scraper -> Processor -> AI Agent -> Notifier)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PTS_DISCORD_WEBHOOK_URL: ${{ secrets.PTS_DISCORD_WEBHOOK_URL }}
          PTS_SLACK_WEBHOOK_URL: ${{ secrets.PTS_SLACK_WEBHOOK_URL }}
          PTS_LINE_ACCESS_TOKEN: ${{ secrets.PTS_LINE_ACCESS_TOKEN }}
        run: python main.py
        
      - name: Cleanup old data (keep past 30 days)
        run: |
          echo "Cleaning up files older than 30 days in docs/data/ directory..."
          find docs/data -name "*.json" ! -name "index.json" -mtime +30 -exec rm {} \;
        
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated daily PTS data update"
          file_pattern: "docs/data/*.json"
